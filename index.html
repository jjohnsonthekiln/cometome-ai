<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF4F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Come to Me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF6EE; --bg-3: #A07840;
  --cream: #4A3618; --gold: #A07840; --gold-dim: #806030;
  --crimson: #A07840; --crimson-dk: #7A5820;
  --border: rgba(74,54,24,0.12);
  --bot-bg: #FFFFFF; --bot-text: #2E2010;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Lato', sans-serif;
}
[data-theme="blush"] {
  --bg: #FAF4F0; --bg-3: #C97B6A;
  --cream: #5C3A2E; --gold: #C97B6A; --gold-dim: #A07060;
  --crimson: #C97B6A; --crimson-dk: #A05A4A;
  --border: rgba(92,58,46,0.12);
  --bot-bg: #FFFFFF; --bot-text: #3D2318;
}
[data-theme="lavender"] {
  --bg: #F5F2FA; --bg-3: #8B6BB1;
  --cream: #3D2A5C; --gold: #8B6BB1; --gold-dim: #7A5A9A;
  --crimson: #8B6BB1; --crimson-dk: #6A4A90;
  --border: rgba(61,42,92,0.12);
  --bot-bg: #FFFFFF; --bot-text: #2A1A40;
}
[data-theme="sage"] {
  --bg: #F3F7F2; --bg-3: #5A8054;
  --cream: #2A3D28; --gold: #5A8054; --gold-dim: #4A6A44;
  --crimson: #5A8054; --crimson-dk: #3A6034;
  --border: rgba(42,61,40,0.12);
  --bot-bg: #FFFFFF; --bot-text: #1C2E1A;
}
[data-theme="blue"] {
  --bg: #E8EEF5; --bg-3: #2C5F8A;
  --cream: #2C3E55; --gold: #2C5F8A; --gold-dim: #7A9AB8;
  --crimson: #2C5F8A; --crimson-dk: #1A4A70;
  --border: rgba(44,62,85,0.12);
  --bot-bg: #FFFFFF; --bot-text: #1A2530;
}
html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; }

/* ── Header ── */
header { display: flex; align-items: center; gap: 12px; padding: 14px 20px 13px; padding-top: calc(14px + env(safe-area-inset-top)); background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; position: relative; }
.h-logo { width: 36px; height: 36px; flex-shrink: 0; border-radius: 8px; object-fit: cover; }
.h-text { flex: 1; }
.h-text h1 { font-family: var(--serif); font-weight: 300; font-size: 22px; color: var(--cream); line-height: 1; }
.h-text p  { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--gold-dim); margin-top: 2px; }

/* ── Custom Language Picker ── */
#lang-btn {
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--cream);
  font-family: var(--sans);
  font-size: 18px;
  padding: 5px 10px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
#lang-btn:hover { border-color: var(--gold); }

#lang-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 14px;
  background: var(--bg);
  border: 0.5px solid rgba(201,169,110,0.25);
  border-radius: 10px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  max-height: 320px;
  overflow-y: auto;
  width: 200px;
  -webkit-overflow-scrolling: touch;
}
#lang-dropdown.open { display: block; }

.lang-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--gold-dim);
  transition: background 0.1s;
  border-bottom: 0.5px solid var(--border);
}
.lang-opt:last-child { border-bottom: none; }
.lang-opt:hover { background: rgba(0,0,0,0.04); color: var(--cream); }
.lang-opt.active { color: var(--gold); font-weight: 400; }
.lang-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
.lang-name { font-size: 13px; }

/* ── Messages ── */
#messages { flex: 1; overflow-y: auto; padding: 24px 16px 12px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.msg { display: flex; flex-direction: column; max-width: 86%; animation: rise 0.22s ease forwards; opacity: 0; }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot  { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 13px 17px; font-size: 17px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
.msg.bot  .bubble { background: var(--bot-bg); color: var(--bot-text); border-radius: 18px 18px 18px 4px; font-family: var(--serif); font-weight: 400; }
.msg.user .bubble { background: var(--bg-3); color: #FFF8F5; border-radius: 18px 18px 4px 18px; border: none; }
.typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; background: var(--bot-bg); border-radius: 18px 18px 18px 4px; width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-dim); animation: bounce 1.1s infinite ease-in-out; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
.err { align-self: center; font-size: 13px; color: #d07070; background: rgba(192,48,64,0.1); border: 0.5px solid rgba(192,48,64,0.25); padding: 9px 14px; border-radius: 10px; max-width: 80%; text-align: center; }

/* ── Input ── */
#input-area { padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
.input-row { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-3); border: 0.5px solid rgba(201,169,110,0.2); border-radius: 26px; padding: 8px 8px 8px 16px; transition: border-color 0.15s; }
.input-row:focus-within { border-color: rgba(201,169,110,0.4); }
textarea { flex: 1; background: transparent; border: none; outline: none; color: #ffffff; font-family: var(--sans); font-weight: 300; font-size: 17px; line-height: 1.5; resize: none; max-height: 120px; min-height: 22px; padding: 1px 0; caret-color: #ffffff; }
textarea::placeholder { color: #ffffff; opacity: 0.6; font-weight: 700; }
#send-btn { width: 36px; height: 36px; flex-shrink: 0; border: none; border-radius: 50%; background: var(--crimson); color: #fff; cursor: pointer; display: grid; place-items: center; transition: background 0.15s, transform 0.1s, opacity 0.15s; }
#send-btn:hover:not(:disabled)  { background: var(--crimson-dk); }
#send-btn:active:not(:disabled) { transform: scale(0.91); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#send-btn svg { width: 15px; height: 15px; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#theme-swatches { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s; flex-shrink: 0; }
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: var(--cream); }

/* ── Contact Button ── */
#contact-btn {
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--cream);
  cursor: pointer;
  flex-shrink: 0;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
#contact-btn:hover { border-color: var(--gold); color: var(--gold); }
#contact-btn svg { width: 16px; height: 16px; display: block; }

/* ── Contact Modal ── */
#contact-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
#contact-modal.open { display: flex; }
.contact-modal-card {
  background: var(--bg);
  border-radius: 14px;
  padding: 28px 24px 22px;
  max-width: 440px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.25);
  position: relative;
}
.contact-modal-card h2 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 26px;
  color: var(--cream);
  margin-bottom: 6px;
}
.contact-modal-card .subtitle {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--gold-dim);
  margin-bottom: 22px;
}
.contact-modal-card label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin: 14px 0 6px;
}
.contact-modal-card input,
.contact-modal-card select,
.contact-modal-card textarea {
  width: 100%;
  padding: 11px 13px;
  background: var(--bot-bg);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--bot-text);
  font-weight: 300;
  outline: none;
  transition: border-color 0.15s;
}
.contact-modal-card input:focus,
.contact-modal-card select:focus,
.contact-modal-card textarea:focus {
  border-color: var(--gold);
}
.contact-modal-card textarea {
  resize: vertical;
  min-height: 110px;
}
.contact-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 22px;
}
.contact-btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--cream);
  transition: all 0.15s;
}
.contact-btn:hover { border-color: var(--gold); color: var(--gold); }
.contact-btn.primary {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}
.contact-btn.primary:hover {
  background: var(--gold-dim);
  border-color: var(--gold-dim);
  color: var(--bg);
}
.contact-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.contact-status {
  margin-top: 14px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
}
.contact-status.success {
  display: block;
  background: rgba(90,128,84,0.12);
  color: #3A6034;
  border: 0.5px solid rgba(90,128,84,0.3);
}
.contact-status.error {
  display: block;
  background: rgba(160,60,40,0.1);
  color: #8B1828;
  border: 0.5px solid rgba(160,60,40,0.25);
}
.contact-close {
  position: absolute;
  top: 14px; right: 14px;
  background: transparent;
  border: none;
  color: var(--gold-dim);
  cursor: pointer;
  font-size: 22px;
  line-height: 1;
  padding: 4px 8px;
  border-radius: 6px;
}
.contact-close:hover { color: var(--cream); }
</style>
</head>
<body>
<div id="app">
  <header>
    <img class="h-logo" src="come-to-me-icon.jpg" alt="Come to Me">
    <div id="theme-swatches">
      <div class="swatch" data-theme="blush" style="background:#C97B6A" title="Blush"></div>
      <div class="swatch" data-theme="lavender" style="background:#8B6BB1" title="Lavender"></div>
      <div class="swatch active" data-theme="" style="background:#A07840" title="Sand"></div>
      <div class="swatch" data-theme="sage" style="background:#5A8054" title="Sage"></div>
      <div class="swatch" data-theme="blue" style="background:#2C5F8A" title="Blue"></div>
    </div>
    <button id="contact-btn" aria-label="Contact" title="Contact us">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </button>
    <button id="lang-btn" aria-haspopup="listbox">
      <span id="lang-flag">🇬🇧</span>
      <span style="font-size:11px; color: var(--cream); opacity:0.6;">▾</span>
    </button>
    <div id="lang-dropdown" role="listbox"></div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Ask anything..." rows="1"></textarea>
      <button id="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Contact Modal -->
<div id="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
  <div class="contact-modal-card">
    <button class="contact-close" id="contact-close" aria-label="Close">×</button>
    <h2 id="contact-modal-title">Get in Touch</h2>
    <p class="subtitle">Questions, prayer requests, or partnership inquiries — we'd love to hear from you.</p>
    <form id="contact-form" action="https://formspree.io/f/mjglbqaj" method="POST">
      <label for="contact-name">Name</label>
      <input type="text" id="contact-name" name="name" required>

      <label for="contact-email">Email</label>
      <input type="email" id="contact-email" name="email" required>

      <label for="contact-subject">How can we help?</label>
      <select id="contact-subject" name="subject" required>
        <option value="" disabled selected>Choose one…</option>
        <option value="Question about the gospel">Question about the gospel</option>
        <option value="Prayer request">Prayer request</option>
        <option value="Partnership / ministry">Partnership / ministry</option>
        <option value="Technical issue">Technical issue</option>
        <option value="Other">Other</option>
      </select>

      <label for="contact-message">Message</label>
      <textarea id="contact-message" name="message" required></textarea>

      <div class="contact-status" id="contact-status"></div>

      <div class="contact-actions">
        <button type="button" class="contact-btn" id="contact-cancel">Cancel</button>
        <button type="submit" class="contact-btn primary" id="contact-submit">Send</button>
      </div>
    </form>
  </div>
</div>

<script>
'use strict';

const LANGS = [
  { code:'en', flag:'🇬🇧', name:'English',    title:'Come to Me',         ph:'Ask anything...',           inst:'Respond in English.',
    open:"Hello. I'm glad you're here. Whatever brought you — a question, a doubt, something heavy on your heart — I'd love to hear it. What's on your mind?" },
  { code:'it', flag:'🇮🇹', name:'Italiano',    title:'Vieni a Me',          ph:'Chiedi qualcosa...',        inst:'Respond entirely in Italian (Italiano).',
    open:"Ciao. Sono contento che tu sia qui. Qualunque cosa ti abbia portato — una domanda, un dubbio, qualcosa di pesante nel cuore — mi piacerebbe ascoltarti. Cosa hai in mente?" },
  { code:'es', flag:'🇪🇸', name:'Español',     title:'Ven a Mí',            ph:'Pregunta algo...',          inst:'Respond entirely in Spanish (Español).',
    open:"Hola. Me alegra que estés aquí. Lo que sea que te haya traído — una pregunta, una duda, algo pesado en el corazón — me encantaría escucharlo. ¿Qué tienes en mente?" },
  { code:'pt', flag:'🇧🇷', name:'Português',   title:'Vinde a Mim',         ph:'Faça uma pergunta...',      inst:'Respond entirely in Portuguese (Português).',
    open:"Olá. Fico feliz que você esteja aqui. O que quer que tenha te trazido — uma pergunta, uma dúvida, algo pesado no coração — adoraria ouvir. O que está em sua mente?" },
  { code:'fr', flag:'🇫🇷', name:'Français',    title:'Venez à Moi',         ph:'Posez une question...',     inst:'Respond entirely in French (Français).',
    open:"Bonjour. Je suis heureux que vous soyez ici. Quoi que vous ayez amené — une question, un doute, quelque chose de lourd sur le cœur — j'aimerais l'entendre. Qu'avez-vous à l'esprit ?" },
  { code:'de', flag:'🇩🇪', name:'Deutsch',     title:'Kommt zu Mir',        ph:'Stellen Sie eine Frage...', inst:'Respond entirely in German (Deutsch).',
    open:"Hallo. Ich bin froh, dass Sie hier sind. Was auch immer Sie hergeführt hat — eine Frage, ein Zweifel, etwas Schweres auf dem Herzen — ich würde es gerne hören. Was beschäftigt Sie?" },
  { code:'ru', flag:'🇷🇺', name:'Русский',     title:'Придите ко Мне',      ph:'Задайте вопрос...',         inst:'Respond entirely in Russian (Русский).',
    open:"Здравствуйте. Я рад, что вы здесь. Что бы вас ни привело — вопрос, сомнение, что-то тяжёлое на сердце — я хотел бы это услышать. Что у вас на уме?" },
  { code:'zh', flag:'🇨🇳', name:'中文',         title:'来就我',               ph:'请提问...',                  inst:'Respond entirely in Simplified Chinese (简体中文).',
    open:"你好。很高兴你在这里。无论是什么带你来到这里——一个问题、一个疑惑、还是心中某些沉重的事——我很想听。你在想什么？" },
  { code:'ja', flag:'🇯🇵', name:'日本語',       title:'我に来たれ',           ph:'質問してください...',        inst:'Respond entirely in Japanese (日本語).',
    open:"こんにちは。来てくださってうれしいです。何があなたをここに連れてきたとしても——質問、疑い、心に重いもの——ぜひ聞かせてください。何を考えていますか？" },
  { code:'ko', flag:'🇰🇷', name:'한국어',       title:'내게로 오라',          ph:'질문하세요...',              inst:'Respond entirely in Korean (한국어).',
    open:"안녕하세요. 여기 오신 것을 기쁘게 생각합니다. 무엇이 당신을 이곳에 데려왔든 — 질문, 의심, 마음에 무거운 것 — 들어보고 싶습니다. 무슨 생각을 하고 계신가요?" },
  { code:'ar', flag:'🇸🇦', name:'العربية',     title:'تعالوا إليّ',          ph:'اطرح سؤالاً...',            inst:'Respond entirely in Arabic (العربية). Use right-to-left text.', rtl:true,
    open:"مرحباً. يسعدني أنك هنا. مهما كان الذي أتى بك — سؤال، شك، شيء ثقيل على القلب — أود أن أسمعه. ما الذي يشغل بالك؟" },
  { code:'hi', flag:'🇮🇳', name:'हिन्दी',      title:'मेरे पास आओ',         ph:'कुछ पूछें...',              inst:'Respond entirely in Hindi (हिन्दी).',
    open:"नमस्ते। खुशी है कि आप यहाँ हैं। जो भी आपको यहाँ लाया — एक सवाल, एक संशय, दिल पर कुछ भारी — मैं सुनना चाहूँगा। आपके मन में क्या है?" },
  { code:'el', flag:'🇬🇷', name:'Ελληνικά',    title:'Ελάτε σε Μένα',      ph:'Ρωτήστε κάτι...',           inst:'Respond entirely in Greek (Ελληνικά).',
    open:"Γεια σου. Χαίρομαι που είσαι εδώ. Ό,τι κι αν σε έφερε — μια ερώτηση, μια αμφιβολία, κάτι βαρύ στην καρδιά — θα ήθελα να το ακούσω. Τι έχεις στο μυαλό σου;" },
  { code:'tr', flag:'🇹🇷', name:'Türkçe',      title:'Bana Gel',            ph:'Bir şey sorun...',           inst:'Respond entirely in Turkish (Türkçe).',
    open:"Merhaba. Burada olduğunuza sevindim. Sizi buraya ne getirmiş olursa olsun — bir soru, bir şüphe, kalbinizde ağır bir şey — duymak isterim. Aklınızda ne var?" },
  { code:'nl', flag:'🇳🇱', name:'Nederlands',  title:'Kom tot Mij',         ph:'Stel een vraag...',          inst:'Respond entirely in Dutch (Nederlands).',
    open:"Hallo. Ik ben blij dat je er bent. Wat je ook hierheen heeft gebracht — een vraag, een twijfel, iets zwaar op je hart — ik zou het graag horen. Wat houdt je bezig?" },
  { code:'pl', flag:'🇵🇱', name:'Polski',      title:'Przyjdźcie do Mnie',  ph:'Zadaj pytanie...',           inst:'Respond entirely in Polish (Polski).',
    open:"Cześć. Cieszę się, że tu jesteś. Cokolwiek cię tu przyprowadziło — pytanie, wątpliwość, coś ciężkiego na sercu — chętnie posłucham. Co masz na myśli?" },
  { code:'uk', flag:'🇺🇦', name:'Українська',  title:'Прийдіть до Мене',   ph:'Задайте питання...',         inst:'Respond entirely in Ukrainian (Українська).',
    open:"Привіт. Радий, що ви тут. Що б вас не привело — питання, сумнів, щось важке на серці — я хотів би це почути. Що у вас на думці?" },
  { code:'ro', flag:'🇷🇴', name:'Română',      title:'Veniți la Mine',     ph:'Puneți o întrebare...',      inst:'Respond entirely in Romanian (Română).',
    open:"Bună. Mă bucur că ești aici. Orice te-a adus — o întrebare, o îndoială, ceva greu pe inimă — aș vrea să aud. Ce ai în minte?" },
  { code:'hr', flag:'🇭🇷', name:'Hrvatski',    title:'Dođite k Meni',      ph:'Postavite pitanje...',       inst:'Respond entirely in Croatian (Hrvatski).',
    open:"Zdravo. Drago mi je da ste ovdje. Što god vas dovelo — pitanje, sumnja, nešto teško na srcu — rado bih čuo. Što vam je na umu?" },
  { code:'he', flag:'🇮🇱', name:'עברית',       title:'בואו אליי',           ph:'שאל שאלה...',               inst:'Respond entirely in Hebrew (עברית). Use right-to-left text.', rtl:true,
    open:"שלום. שמח שאתה כאן. מה שלא הביא אותך — שאלה, ספק, משהו כבד בלב — אשמח לשמוע. מה עובר לך בראש?" },
  { code:'sw', flag:'🇰🇪', name:'Swahili',     title:'Njooni Kwangu',      ph:'Uliza swali...',             inst:'Respond entirely in Swahili (Kiswahili).',
    open:"Habari. Ninafurahi uko hapa. Chochote kilichokuleta — swali, shaka, kitu kizito moyoni — ningependa kusikia. Unafikiria nini?" },
  { code:'id', flag:'🇮🇩', name:'Indonesia',   title:'Datanglah kepadaKu', ph:'Ajukan pertanyaan...',       inst:'Respond entirely in Indonesian (Bahasa Indonesia).',
    open:"Halo. Senang kamu di sini. Apapun yang membawamu ke sini — pertanyaan, keraguan, sesuatu yang berat di hati — ingin mendengarnya. Apa yang ada di pikiranmu?" },
];

let currentLang = LANGS[0];
let sessionId = crypto.randomUUID();
let turnCount = 0;
let history = [];
let busy = false;
let dropOpen = false;

const msgsEl    = document.getElementById('messages');
const inputEl   = document.getElementById('msg-input');
const btnEl     = document.getElementById('send-btn');
const langBtn   = document.getElementById('lang-btn');
const langFlag  = document.getElementById('lang-flag');
const dropdown  = document.getElementById('lang-dropdown');
const hTitle    = document.getElementById('h-title');

/* Build dropdown options */
LANGS.forEach(L => {
  const el = document.createElement('div');
  el.className = 'lang-opt';
  el.dataset.code = L.code;
  el.innerHTML = `<span class="lang-flag">${L.flag}</span><span class="lang-name">${L.name}</span>`;
  el.addEventListener('click', () => { selectLang(L.code); });
  dropdown.appendChild(el);
});

function toggleDropdown() {
  dropOpen = !dropOpen;
  dropdown.classList.toggle('open', dropOpen);
}

function closeDropdown() {
  dropOpen = false;
  dropdown.classList.remove('open');
}

langBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
document.addEventListener('click', closeDropdown);
dropdown.addEventListener('click', (e) => e.stopPropagation());

function selectLang(code) {
  const L = LANGS.find(l => l.code === code);
  if (!L) return;
  currentLang = L;
  langFlag.textContent = L.flag;
  if (hTitle) hTitle.textContent = L.title;
  inputEl.placeholder  = L.ph;
  document.documentElement.setAttribute('dir', L.rtl ? 'rtl' : 'ltr');
  dropdown.querySelectorAll('.lang-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });
  history = [{ role: 'assistant', content: L.open }];
  msgsEl.innerHTML = '';
  addBotMsg(L.open);
  btnEl.disabled = true;
  sessionId = crypto.randomUUID(); turnCount = 0;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  closeDropdown();
}

function logConversation(userMsg, aiMsg) {
  turnCount++;
  fetch("/api/log", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      session_id:   sessionId,
      lang:         currentLang.code,
      turn:         turnCount,
      user_message: userMsg,
      ai_response:  aiMsg,
    }),
  }).catch(() => {}); // silent — never block the UI
}

function init() {
  selectLang('en');
  inputEl.addEventListener('input', handleInput);
  inputEl.addEventListener('keydown', handleKey);
  btnEl.addEventListener('click', submit);
}

function handleInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  btnEl.disabled = !inputEl.value.trim() || busy;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btnEl.disabled) submit(); }
}

async function submit() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  btnEl.disabled = true; busy = true;
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  const typingEl = addTyping(); scrollEnd();

  const botDiv = document.createElement('div'); botDiv.className = 'msg bot';
  const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'bubble';
  botDiv.appendChild(bubbleDiv);
  let reply = '';

  try {
    await streamChat(history, currentLang.code, (chunk) => {
      if (typingEl.isConnected) { typingEl.remove(); msgsEl.appendChild(botDiv); }
      reply += chunk; bubbleDiv.textContent = reply; scrollEnd();
    });
    history.push({ role: 'assistant', content: reply });
    logConversation(text, reply);
  } catch (err) {
    if (typingEl.isConnected) typingEl.remove();
    addError('Something went wrong. Please try again.');
  }
  busy = false; btnEl.disabled = !inputEl.value.trim(); scrollEnd();
}

async function streamChat(messages, lang, onChunk) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, lang }),
  });
  if (!res.ok) throw new Error(`Server error ${res.status}`);
  const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop() ?? '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim(); if (raw === '[DONE]') return;
      try { const ev = JSON.parse(raw); if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') onChunk(ev.delta.text); } catch {}
    }
  }
}

function addBotMsg(text) {
  const d = document.createElement('div'); d.className = 'msg bot';
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  d.appendChild(b); msgsEl.appendChild(d); scrollEnd();
}
function addUserMsg(text) {
  const d = document.createElement('div'); d.className = 'msg user';
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  d.appendChild(b); msgsEl.appendChild(d); scrollEnd();
}
function addTyping() {
  const d = document.createElement('div'); d.className = 'msg bot';
  d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  msgsEl.appendChild(d); scrollEnd(); return d;
}
function addError(msg) {
  const d = document.createElement('div'); d.className = 'err'; d.textContent = msg;
  msgsEl.appendChild(d); scrollEnd();
}
function scrollEnd() { msgsEl.scrollTop = msgsEl.scrollHeight; }

document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    const theme = s.dataset.theme;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
  });
});

/* ── Contact Modal ─────────────────────────────────────────── */
(function() {
  const modal = document.getElementById('contact-modal');
  const openBtn = document.getElementById('contact-btn');
  const closeBtn = document.getElementById('contact-close');
  const cancelBtn = document.getElementById('contact-cancel');
  const form = document.getElementById('contact-form');
  const submitBtn = document.getElementById('contact-submit');
  const status = document.getElementById('contact-status');

  function openModal() {
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('contact-name').focus(), 100);
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    status.className = 'contact-status';
    status.textContent = '';
  }

  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  cancelBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    status.className = 'contact-status';
    status.textContent = '';

    try {
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        status.className = 'contact-status success';
        status.textContent = 'Thank you — your message has been sent. We\'ll be in touch soon.';
        form.reset();
        setTimeout(closeModal, 2400);
      } else {
        const json = await res.json().catch(() => ({}));
        const msg = (json.errors && json.errors[0] && json.errors[0].message) || 'Something went wrong. Please try again.';
        status.className = 'contact-status error';
        status.textContent = msg;
      }
    } catch (err) {
      status.className = 'contact-status error';
      status.textContent = 'Network error. Please check your connection and try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send';
    }
  });
})();

init();
</script>
</body>

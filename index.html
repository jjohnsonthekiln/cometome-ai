<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF4F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Come to Me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF4F0; --bg-3: #C97B6A;
  --cream: #5C3A2E; --gold: #C97B6A; --gold-dim: #A07060;
  --crimson: #C97B6A; --crimson-dk: #A05A4A;
  --border: rgba(92,58,46,0.12);
  --bot-bg: #FFFFFF; --bot-text: #3D2318;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Lato', sans-serif;
}
[data-theme="lavender"] {
  --bg: #F5F2FA; --bg-3: #8B6BB1;
  --cream: #3D2A5C; --gold: #8B6BB1; --gold-dim: #7A5A9A;
  --crimson: #8B6BB1; --crimson-dk: #6A4A90;
  --border: rgba(61,42,92,0.12);
  --bot-bg: #FFFFFF; --bot-text: #2A1A40;
}
[data-theme="sand"] {
  --bg: #FAF6EE; --bg-3: #A07840;
  --cream: #4A3618; --gold: #A07840; --gold-dim: #806030;
  --crimson: #A07840; --crimson-dk: #7A5820;
  --border: rgba(74,54,24,0.12);
  --bot-bg: #FFFFFF; --bot-text: #2E2010;
}
[data-theme="sage"] {
  --bg: #F3F7F2; --bg-3: #5A8054;
  --cream: #2A3D28; --gold: #5A8054; --gold-dim: #4A6A44;
  --crimson: #5A8054; --crimson-dk: #3A6034;
  --border: rgba(42,61,40,0.12);
  --bot-bg: #FFFFFF; --bot-text: #1C2E1A;
}
html, body { height: 100%; background: var(--bg); color: var(--cream); font-family: var(--sans); font-weight: 300; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; }

/* ── Header ── */
header { display: flex; align-items: center; gap: 12px; padding: 14px 20px 13px; padding-top: calc(14px + env(safe-area-inset-top)); background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; position: relative; }
.h-logo { width: 36px; height: 36px; flex-shrink: 0; border-radius: 8px; }
.h-text { flex: 1; }
.h-text h1 { font-family: var(--serif); font-weight: 300; font-size: 22px; color: var(--cream); line-height: 1; }
.h-text p  { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--gold-dim); margin-top: 2px; }

/* ── Custom Language Picker ── */
#lang-btn {
  background: var(--bg-3);
  border: 0.5px solid rgba(201,169,110,0.25);
  border-radius: 8px;
  color: var(--gold);
  font-family: var(--sans);
  font-size: 18px;
  padding: 5px 10px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
#lang-btn:hover { border-color: rgba(201,169,110,0.5); }

#lang-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  right: 14px;
  background: var(--bg);
  border: 0.5px solid rgba(201,169,110,0.25);
  border-radius: 10px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  max-height: 320px;
  overflow-y: auto;
  width: 200px;
  -webkit-overflow-scrolling: touch;
}
#lang-dropdown.open { display: block; }

.lang-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  color: var(--gold-dim);
  transition: background 0.1s;
  border-bottom: 0.5px solid var(--border);
}
.lang-opt:last-child { border-bottom: none; }
.lang-opt:hover { background: rgba(0,0,0,0.04); color: var(--cream); }
.lang-opt.active { color: var(--gold); font-weight: 400; }
.lang-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
.lang-name { font-size: 13px; }

/* ── Messages ── */
#messages { flex: 1; overflow-y: auto; padding: 24px 16px 12px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.msg { display: flex; flex-direction: column; max-width: 86%; animation: rise 0.22s ease forwards; opacity: 0; }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot  { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 13px 17px; font-size: 17px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
.msg.bot  .bubble { background: var(--bot-bg); color: var(--bot-text); border-radius: 18px 18px 18px 4px; font-family: var(--serif); font-weight: 400; }
.msg.user .bubble { background: var(--bg-3); color: #FFF8F5; border-radius: 18px 18px 4px 18px; border: none; }
.typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; background: var(--bot-bg); border-radius: 18px 18px 18px 4px; width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-dim); animation: bounce 1.1s infinite ease-in-out; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }
.err { align-self: center; font-size: 13px; color: #d07070; background: rgba(192,48,64,0.1); border: 0.5px solid rgba(192,48,64,0.25); padding: 9px 14px; border-radius: 10px; max-width: 80%; text-align: center; }

/* ── Input ── */
#input-area { padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); border-top: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
.input-row { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-3); border: 0.5px solid rgba(201,169,110,0.2); border-radius: 26px; padding: 8px 8px 8px 16px; transition: border-color 0.15s; }
.input-row:focus-within { border-color: rgba(201,169,110,0.4); }
textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--cream); font-family: var(--sans); font-weight: 300; font-size: 17px; line-height: 1.5; resize: none; max-height: 120px; min-height: 22px; padding: 1px 0; caret-color: var(--gold); }
textarea::placeholder { color: var(--gold-dim); opacity: 0.7; }
#send-btn { width: 36px; height: 36px; flex-shrink: 0; border: none; border-radius: 50%; background: var(--crimson); color: #fff; cursor: pointer; display: grid; place-items: center; transition: background 0.15s, transform 0.1s, opacity 0.15s; }
#send-btn:hover:not(:disabled)  { background: var(--crimson-dk); }
#send-btn:active:not(:disabled) { transform: scale(0.91); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
#send-btn svg { width: 15px; height: 15px; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
#theme-swatches { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s; flex-shrink: 0; }
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: var(--cream); }
</style>
</head>

let currentLang = LANGS[0];
let sessionId = crypto.randomUUID();
let turnCount = 0;
let history = [];
let busy = false;
let dropOpen = false;

const msgsEl    = document.getElementById('messages');
const inputEl   = document.getElementById('msg-input');
const btnEl     = document.getElementById('send-btn');
const langBtn   = document.getElementById('lang-btn');
const langFlag  = document.getElementById('lang-flag');
const dropdown  = document.getElementById('lang-dropdown');
const hTitle    = document.getElementById('h-title');

/* Build dropdown options */
LANGS.forEach(L => {
  const el = document.createElement('div');
  el.className = 'lang-opt';
  el.dataset.code = L.code;
  el.innerHTML = `<span class="lang-flag">${L.flag}</span><span class="lang-name">${L.name}</span>`;
  el.addEventListener('click', () => { selectLang(L.code); });
  dropdown.appendChild(el);
});

function toggleDropdown() {
  dropOpen = !dropOpen;
  dropdown.classList.toggle('open', dropOpen);
}

function closeDropdown() {
  dropOpen = false;
  dropdown.classList.remove('open');
}

langBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
document.addEventListener('click', closeDropdown);
dropdown.addEventListener('click', (e) => e.stopPropagation());

function selectLang(code) {
  const L = LANGS.find(l => l.code === code);
  if (!L) return;
  currentLang = L;
  langFlag.textContent = L.flag;
  if (hTitle) hTitle.textContent = L.title;
  inputEl.placeholder  = L.ph;
  document.documentElement.setAttribute('dir', L.rtl ? 'rtl' : 'ltr');
  dropdown.querySelectorAll('.lang-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });
  history = [{ role: 'assistant', content: L.open }];
  msgsEl.innerHTML = '';
  addBotMsg(L.open);
  btnEl.disabled = true;
  sessionId = crypto.randomUUID(); turnCount = 0;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  closeDropdown();
}

function logConversation(userMsg, aiMsg) {
  turnCount++;
  fetch("/api/log", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      session_id:   sessionId,
      lang:         currentLang.code,
      turn:         turnCount,
      user_message: userMsg,
      ai_response:  aiMsg,
    }),
  }).catch(() => {}); // silent — never block the UI
}

function init() {
  selectLang('en');
  inputEl.addEventListener('input', handleInput);
  inputEl.addEventListener('keydown', handleKey);
  btnEl.addEventListener('click', submit);
}

function handleInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  btnEl.disabled = !inputEl.value.trim() || busy;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btnEl.disabled) submit(); }
}

async function submit() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  btnEl.disabled = true; busy = true;
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  const typingEl = addTyping(); scrollEnd();

  const botDiv = document.createElement('div'); botDiv.className = 'msg bot';
  const bubbleDiv = document.createElement('div'); bubbleDiv.className = 'bubble';
  botDiv.appendChild(bubbleDiv);
  let reply = '';

  try {
    await streamChat(history, currentLang.code, (chunk) => {
      if (typingEl.isConnected) { typingEl.remove(); msgsEl.appendChild(botDiv); }
      reply += chunk; bubbleDiv.textContent = reply; scrollEnd();
    });
    history.push({ role: 'assistant', content: reply });
    logConversation(text, reply);
  } catch (err) {
    if (typingEl.isConnected) typingEl.remove();
    addError('Something went wrong. Please try again.');
  }
  busy = false; btnEl.disabled = !inputEl.value.trim(); scrollEnd();
}

async function streamChat(messages, lang, onChunk) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, lang }),
  });
  if (!res.ok) throw new Error(`Server error ${res.status}`);
  const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop() ?? '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim(); if (raw === '[DONE]') return;
      try { const ev = JSON.parse(raw); if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') onChunk(ev.delta.text); } catch {}
    }
  }
}

function addBotMsg(text) {
  const d = document.createElement('div'); d.className = 'msg bot';
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  d.appendChild(b); msgsEl.appendChild(d); scrollEnd();
}
function addUserMsg(text) {
  const d = document.createElement('div'); d.className = 'msg user';
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  d.appendChild(b); msgsEl.appendChild(d); scrollEnd();
}
function addTyping() {
  const d = document.createElement('div'); d.className = 'msg bot';
  d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  msgsEl.appendChild(d); scrollEnd(); return d;
}
function addError(msg) {
  const d = document.createElement('div'); d.className = 'err'; d.textContent = msg;
  msgsEl.appendChild(d); scrollEnd();
}
function scrollEnd() { msgsEl.scrollTop = msgsEl.scrollHeight; }

document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    const theme = s.dataset.theme;
    document.documentElement.setAttribute('data-theme', theme);
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
  });
});

init();
</script>
</body>

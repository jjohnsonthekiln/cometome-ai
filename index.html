<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#18150F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Come to Me</title>
<meta name="description" content="A real conversation about Jesus.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #18150F;
  --bg-2:       #201D16;
  --bg-3:       #2A2520;
  --cream:      #EDE0C4;
  --cream-lt:   #F5EDD8;
  --gold:       #C9A96E;
  --gold-dim:   #7a6b4a;
  --gold-dark:  #4e4232;
  --crimson:    #C03040;
  --crimson-dk: #8B1520;
  --border:     rgba(201,169,110,0.12);
  --bot-bg:     #F0E8D4;
  --bot-text:   #1C1812;
  --serif:      'Cormorant Garamond', Georgia, serif;
  --sans:       'Lato', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--cream);
  font-family: var(--sans);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* ── Header ─────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px 13px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}

.h-logo { width: 36px; height: 36px; flex-shrink: 0; }

.h-text h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: 22px;
  color: var(--cream);
  line-height: 1;
  letter-spacing: 0.01em;
}

.h-text p {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--gold-dim);
  margin-top: 2px;
  letter-spacing: 0.05em;
}

/* ── Messages ───────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.msg {
  display: flex;
  flex-direction: column;
  max-width: 86%;
  animation: rise 0.22s ease forwards;
  opacity: 0;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.bot  { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 12px 16px;
  font-size: 15px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg.bot .bubble {
  background: var(--bot-bg);
  color: var(--bot-text);
  border-radius: 18px 18px 18px 4px;
  font-family: var(--sans);
  font-weight: 300;
}

.msg.user .bubble {
  background: var(--bg-3);
  color: var(--cream);
  border-radius: 18px 18px 4px 18px;
  border: 0.5px solid rgba(201,169,110,0.18);
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 14px 18px;
  background: var(--bot-bg);
  border-radius: 18px 18px 18px 4px;
  width: fit-content;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #6a5a45;
  animation: pulse 1.3s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes pulse {
  0%, 60%, 100% { transform: scale(0.75); opacity: 0.3; }
  30% { transform: scale(1); opacity: 0.8; }
}

/* Error */
.err {
  align-self: center;
  font-size: 13px;
  color: #d07070;
  background: rgba(192,48,64,0.1);
  border: 0.5px solid rgba(192,48,64,0.25);
  padding: 9px 14px;
  border-radius: 10px;
  max-width: 80%;
  text-align: center;
}

/* ── Input ──────────────────────────── */
#input-area {
  padding: 10px 14px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  border-top: 0.5px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg-3);
  border: 0.5px solid rgba(201,169,110,0.2);
  border-radius: 26px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.15s;
}

.input-row:focus-within {
  border-color: rgba(201,169,110,0.4);
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cream);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 15px;
  line-height: 1.5;
  resize: none;
  max-height: 120px;
  min-height: 22px;
  padding: 1px 0;
  caret-color: var(--gold);
}

textarea::placeholder { color: var(--gold-dim); opacity: 0.7; }

#send-btn {
  width: 36px; height: 36px;
  flex-shrink: 0;
  border: none;
  border-radius: 50%;
  background: var(--crimson);
  color: #fff;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
}

#send-btn:hover:not(:disabled)  { background: var(--crimson-dk); }
#send-btn:active:not(:disabled) { transform: scale(0.91); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#send-btn svg { width: 15px; height: 15px; }

/* ── Scrollbar ──────────────────────── */
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <header>
    <svg class="h-logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hBg" cx="50%" cy="44%" r="62%">
          <stop offset="0%" stop-color="#3A0C14"/>
          <stop offset="100%" stop-color="#140308"/>
        </radialGradient>
        <radialGradient id="hCx" cx="512" cy="468" r="390" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#F2C8CC"/>
          <stop offset="30%"  stop-color="#D04050"/>
          <stop offset="100%" stop-color="#7A1522"/>
        </radialGradient>
      </defs>
      <rect width="1024" height="1024" rx="224" fill="url(#hBg)"/>
      <rect x="338" y="148" width="348" height="728" rx="68" fill="url(#hCx)"/>
      <rect x="148" y="338" width="728" height="348" rx="68" fill="url(#hCx)"/>
      <rect x="476" y="222" width="72" height="582" rx="10" fill="white"/>
      <rect x="334" y="408" width="356" height="72"  rx="10" fill="white"/>
    </svg>
    <div class="h-text">
      <h1>Come to Me</h1>
      <p>Matthew 11:28</p>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Ask anything..." rows="1"></textarea>
      <button id="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

</div>
<script>
'use strict';

// Opening message — shown immediately, no API call needed
const OPENING = "You're here for a reason — maybe curiosity, maybe a question that won't leave you alone, maybe something harder than that. Whatever brought you, I'm glad.\n\nThere's one question that matters more than any other: Who is Jesus, and what does He have to do with you? Let's talk.";

// Full conversation history sent to API on each request
let history = [{ role: 'assistant', content: OPENING }];
let busy = false;

const msgsEl  = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const btnEl   = document.getElementById('send-btn');

// ── Bootstrap ──────────────────────────────────
function init() {
  addBotMsg(OPENING);
  inputEl.addEventListener('input', handleInput);
  inputEl.addEventListener('keydown', handleKey);
  btnEl.addEventListener('click', submit);
}

// ── Input ───────────────────────────────────────
function handleInput() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  btnEl.disabled = !inputEl.value.trim() || busy;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!btnEl.disabled) submit();
  }
}

// ── Submit ──────────────────────────────────────
async function submit() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  btnEl.disabled = true;
  busy = true;

  addUserMsg(text);
  history.push({ role: 'user', content: text });

  const typingEl = addTyping();
  scrollEnd();

  // Bot message container (hidden until first chunk arrives)
  const botDiv = document.createElement('div');
  botDiv.className = 'msg bot';
  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'bubble';
  botDiv.appendChild(bubbleDiv);

  let reply = '';

  try {
    await streamChat(history, (chunk) => {
      if (typingEl.isConnected) {
        typingEl.remove();
        msgsEl.appendChild(botDiv);
      }
      reply += chunk;
      bubbleDiv.textContent = reply;
      scrollEnd();
    });
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    if (typingEl.isConnected) typingEl.remove();
    addError('Something went wrong. Please try again.');
    console.error(err);
  }

  busy = false;
  btnEl.disabled = !inputEl.value.trim();
  scrollEnd();
}

// ── Streaming ───────────────────────────────────
async function streamChat(messages, onChunk) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages }),
  });

  if (!res.ok) throw new Error(`Server error ${res.status}`);

  const reader = res.body.getReader();
  const dec    = new TextDecoder();
  let   buf    = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop() ?? '';

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') return;
      try {
        const ev = JSON.parse(raw);
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
          onChunk(ev.delta.text);
        }
      } catch { /* skip malformed lines */ }
    }
  }
}

// ── UI helpers ──────────────────────────────────
function addBotMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  d.appendChild(b);
  msgsEl.appendChild(d);
  scrollEnd();
}

function addUserMsg(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  d.appendChild(b);
  msgsEl.appendChild(d);
  scrollEnd();
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  msgsEl.appendChild(d);
  scrollEnd();
  return d;
}

function addError(msg) {
  const d = document.createElement('div');
  d.className = 'err';
  d.textContent = msg;
  msgsEl.appendChild(d);
  scrollEnd();
}

function scrollEnd() {
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

init();
</script>
</body>
</html>
